<style>
:root{
  --bg:#080a0d; --panel:#0e1218; --panel2:#11161d; --head:#0b0f14;
  --border:#1b232d; --border2:#242f3b;
  --text:#c5d0db; --text2:#8593a1; --muted:#566472; --faint:#3a4654;
  --up:#ff4d56; --down:#4d8dff; --flat:#8593a1;
  --accent:#27c2a0; --accent2:#d8a24a; --warn:#e7b94e;
  --mono:'IBM Plex Mono','SFMono-Regular',ui-monospace,Menlo,monospace;
  --sans:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:12px;line-height:1.35;overflow:hidden;
  background-image:radial-gradient(circle at 80% -10%, rgba(39,194,160,.05), transparent 40%);}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--flat)}
.nodata{color:var(--faint);font-size:11px}

#demoBar{display:none;background:repeating-linear-gradient(45deg,#332a06,#332a06 10px,#2c2405 10px,#2c2405 20px);
  color:var(--warn);font-size:11px;padding:5px 12px;border-bottom:1px solid #4a3c0c;font-family:var(--mono);letter-spacing:.02em}
#demoBar b{color:#ffd86b}

#app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:14px;background:var(--head);border-bottom:1px solid var(--border2);padding:7px 14px;flex:0 0 auto}
.brand{display:flex;align-items:baseline;gap:8px}
.brand .logo{font-family:var(--mono);font-weight:600;color:var(--accent);font-size:15px;letter-spacing:.04em}
.brand .sub{color:var(--muted);font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.topbar .clock{margin-left:auto;font-family:var(--mono);color:var(--text2);font-size:11px}
.topbar .asof{font-family:var(--mono);font-size:10px;color:var(--muted);border:1px solid var(--border2);padding:3px 8px;border-radius:3px}
.topbar .asof b{color:var(--accent)}

.strip{display:flex;background:var(--head);border-bottom:1px solid var(--border);overflow-x:auto;flex:0 0 auto;scrollbar-width:thin}
.strip::-webkit-scrollbar{height:5px} .strip::-webkit-scrollbar-thumb{background:var(--border2)}
.chip{display:flex;flex-direction:column;gap:1px;padding:6px 14px;border-right:1px solid var(--border);white-space:nowrap;min-width:96px}
.chip .lbl{font-size:9.5px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.chip .val{font-family:var(--mono);font-size:13px;font-weight:500}
.chip .chg{font-family:var(--mono);font-size:10px}

.grid{flex:1 1 auto;display:grid;gap:7px;padding:7px;min-height:0;
  grid-template-columns:280px 1fr 320px;grid-template-rows:1fr auto;
  grid-template-areas:"left center right" "news news news";overflow:hidden}
.col{display:flex;flex-direction:column;gap:7px;min-height:0;overflow-y:auto;scrollbar-width:thin}
.col::-webkit-scrollbar{width:6px} .col::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.area-left{grid-area:left} .area-center{grid-area:center;overflow:hidden}
.area-right{grid-area:right} .area-news{grid-area:news}

.panel{background:var(--panel);border:1px solid var(--border);border-radius:5px;display:flex;flex-direction:column;min-height:0}
.panel.flex{flex:1 1 auto}
.ph{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);flex:0 0 auto}
.ph h2{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);font-weight:600}
.ph .tag{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--muted)}
.ph .seg{margin-left:auto}
.pb{padding:8px 10px;overflow:auto;scrollbar-width:thin}
.pb::-webkit-scrollbar{width:6px} .pb::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.flowrow{display:grid;grid-template-columns:42px 1fr 78px;align-items:center;gap:8px;padding:5px 0}
.flowrow+.flowrow{border-top:1px solid var(--border)}
.flowrow .who{font-size:11px;color:var(--text2)}
.flowrow .amt{font-family:var(--mono);font-size:12px;text-align:right;font-weight:500}
.bar{height:7px;background:var(--panel2);border-radius:2px;position:relative;overflow:hidden}
.bar i{position:absolute;top:0;bottom:0;width:0}
.subtle{color:var(--muted);font-size:10px;margin-top:6px;font-family:var(--mono)}

.heat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.cell{border-radius:4px;padding:7px 8px;display:flex;flex-direction:column;gap:2px;border:1px solid transparent}
.cell .n{font-size:11px;color:#e6edf3}
.cell .p{font-family:var(--mono);font-size:12px;font-weight:600}

table{width:100%;border-collapse:collapse}
th{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;text-align:right;padding:4px 6px;font-weight:500;position:sticky;top:0;background:var(--panel)}
th:first-child{text-align:left}
td{font-family:var(--mono);font-size:12px;text-align:right;padding:5px 6px;border-top:1px solid var(--border)}
td:first-child{text-align:left;font-family:var(--sans);color:var(--text2)}
tr:hover td{background:var(--panel2)}
.tk{font-family:var(--mono);font-size:9px;color:var(--muted)}

.ern{display:grid;grid-template-columns:1fr auto auto auto;gap:6px;align-items:center;padding:7px 0;border-top:1px solid var(--border)}
.ern:first-child{border-top:0}
.ern .nm{font-size:12px;color:var(--text)}
.ern .v{font-family:var(--mono);font-size:11px;text-align:right}
.ern .v .k{display:block;font-size:8px;color:var(--muted);font-family:var(--sans)}

.widget-slot{position:relative;flex:1 1 auto;min-height:0;overflow:hidden}
.widget-slot.nightbox{flex:0 0 auto;height:150px}
.widget-slot iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:transparent;z-index:1}
.widget-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--faint);font-size:10.5px;line-height:1.55;padding:14px;font-family:var(--mono)}
.night{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:10px 14px;gap:8px}
.night .sub{font-family:var(--mono);font-size:10px;color:var(--muted)}
.night .big{font-family:var(--mono);font-size:26px;font-weight:600}
.evtwrap{position:absolute;inset:0;overflow:auto;scrollbar-width:thin}
.evt{display:flex;gap:9px;padding:7px 10px;border-bottom:1px solid var(--border);align-items:baseline}
.evt .t{font-family:var(--mono);font-size:10px;color:var(--accent2);min-width:44px;flex:0 0 auto}
.evt .e{font-size:12px;color:var(--text);flex:1 1 auto;line-height:1.4}
.fl{font-size:8.5px;padding:1px 5px;border-radius:3px;font-family:var(--mono);flex:0 0 auto}
.fl.kr{background:rgba(77,141,255,.15);color:#7fb0ff} .fl.us{background:rgba(231,185,78,.15);color:#e7b94e} .fl.hi{background:rgba(255,77,86,.16);color:#ff8088}

.area-news .pb{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:0 18px;max-height:200px}
.news-item{padding:8px 0;border-bottom:1px solid var(--border)}
.news-item a{color:var(--text);text-decoration:none;font-size:12.5px;font-weight:500;line-height:1.4}
.news-item a:hover{color:var(--accent)}
.news-item .sum{color:var(--text2);font-size:11px;margin-top:3px;line-height:1.45}
.news-item .src{color:var(--muted);font-size:10px;margin-top:4px;font-family:var(--mono);display:flex;gap:8px}

.chartpanel{height:100%}
.chartbar{display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.chartbar select{background:var(--panel2);color:var(--text);border:1px solid var(--border2);border-radius:4px;padding:4px 8px;font-family:var(--mono);font-size:12px;outline:none}
.seg{display:flex;border:1px solid var(--border2);border-radius:4px;overflow:hidden}
.seg button{background:transparent;color:var(--text2);border:0;border-right:1px solid var(--border);padding:4px 8px;font-family:var(--mono);font-size:10.5px;cursor:pointer}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--accent);color:#04110d;font-weight:600}
.seg button:hover:not(.on){background:var(--panel2);color:var(--text)}
.seg.sm button{padding:2px 7px;font-size:9.5px}
.seglbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-left:4px}
.legend{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.legend b{font-weight:600}
canvas{display:block;width:100%;height:100%;cursor:crosshair}
.canvas-wrap{position:relative;flex:1 1 auto;min-height:0}

.foot{flex:0 0 auto;display:flex;gap:16px;padding:5px 14px;border-top:1px solid var(--border);background:var(--head);font-family:var(--mono);font-size:10px;color:var(--muted)}
.foot .ok{color:var(--accent)} .foot .miss{color:var(--warn)}
.foot .right{margin-left:auto}

@media (max-width:1100px){.grid{grid-template-columns:1fr 1fr;grid-template-areas:"center center" "left right" "news news"}.area-center{height:62vh}}
@media (max-width:680px){.grid{grid-template-columns:1fr;grid-template-areas:"center" "left" "right" "news"}.area-center{height:56vh}}
</style>

const has=v=>v!==null&&v!==undefined&&!(Array.isArray(v)&&v.length===0);
const cls=v=>v>0?'up':v<0?'down':'flat';
const sign=v=>v>0?'+':'';
function fmt(n,d=0){if(!has(n))return null;return Number(n).toLocaleString('ko-KR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function pct(n){if(!has(n))return ND;return `<span class="${cls(n)} mono">${sign(n)}${n.toFixed(2)}%</span>`;}
function num(n,d=0){const f=fmt(n,d);return f===null?ND:`<span class="mono">${f}</span>`;}
function won(n){if(!has(n))return ND;const a=Math.abs(n);let s;
  if(a>=10000)s=(n/10000).toFixed(2)+'조';else s=Math.round(n).toLocaleString('ko-KR')+'억';
  return `<span class="${cls(n)} mono">${sign(n)}${s}</span>`;}

setInterval(()=>{$('#clock').textContent=new Date().toLocaleTimeString('ko-KR',{hour12:false});},1000);

function genOHLC(seed,start,years,base,drift,vol){
  let r=seed,rnd=()=>{r=(r*1103515245+12345)&0x7fffffff;return r/0x7fffffff;};
  const out=[],days=Math.round(years*252);let p=base,t=start;
  for(let i=0;i<days;i++){t+=86400000;const wd=new Date(t).getUTCDay();if(wd===0||wd===6)continue;
    const o=p,ch=(rnd()-0.5)*vol+drift,c=Math.max(o*(1+ch),o*0.5);
    const hi=Math.max(o,c)*(1+rnd()*vol*0.5),lo=Math.min(o,c)*(1-rnd()*vol*0.5);
    out.push([t,+o.toFixed(2),+hi.toFixed(2),+lo.toFixed(2),+c.toFixed(2),Math.round((0.6+rnd())*1e7)]);p=c;}
  return out;
}

};

let DATA=null,DEMO=false;
const SAMPLE_SCHEDULE=[
  {time:"08:00",region:"KR",event:"한국 5월 수출입동향 (관세청)",importance:"hi"},
  {time:"09:00",region:"KR",event:"삼성전자 임시주주총회",importance:"mid"},
  {time:"16:00",region:"KR",event:"5월 외환보유액 (한국은행)",importance:"mid"},
  {time:"21:30",region:"US",event:"미국 5월 비농업고용지수·실업률",importance:"hi"},
  {time:"23:00",region:"US",event:"미국 4월 도매재고",importance:"mid"},
  {time:"-",region:"KR",event:"6월 선물·옵션 동시만기일(쿼드러플위칭)",importance:"hi"}
];
const PERIODS=[["1M",1],["3M",3],["6M",6],["1Y",12],["2Y",24],["5Y",60],["10Y",120]];
const INTERVALS=[["1D","D"],["1W","W"],["1M","M"]];
let state={sym:null,period:12,interval:"D",chartType:"area"};
let moverTab='gainers';

async function load(){
  try{const r=await fetch('snapshot.json',{cache:'no-store'});if(!r.ok)throw 0;DATA=await r.json();DEMO=false;}
  catch(e){DATA=SAMPLE;DEMO=true;$('#demoBar').style.display='block';}
  render();
}
load();

function render(){
  $('#asof').textContent=DATA.meta&&DATA.meta.generated_at?DATA.meta.generated_at.replace('T',' ').slice(0,16):(DEMO?'샘플':'데이터 없음');
  renderStrip();renderFlows();renderHeat();renderMovers();renderEarn();renderNews();renderWidgets();renderStatus();initChartControls();
}

function chip(o){
  if(!has(o))return `<div class="chip"><span class="lbl">—</span><span class="val nodata">데이터 없음</span></div>`;
  const u=o.unit||'';const last=has(o.last)?fmt(o.last,(o.last%1!==0||u==='%')?2:0):null;
  return `<div class="chip"><span class="lbl">${o.name||''}</span><span class="val mono">${last===null?ND:last+u}</span><span class="chg">${has(o.change_pct)?pct(o.change_pct):'<span class="nodata">—</span>'}</span></div>`;
}
function renderStrip(){
  const i=DATA.indices||{},g=DATA.global||{};
  $('#strip').innerHTML=[i.kospi,i.kosdaq,g.ewy,g.usdkrw,g.sp500,g.nasdaq,g.sox,g.us10y,g.dxy,g.wti,g.vkospi].map(chip).join('');
}

function renderFlows(){
  const f=DATA.flows;if(!has(f)){$('#flows').innerHTML=ND;return;}
  const mkt=(label,o)=>{if(!has(o))return `<div class="subtle" style="margin:8px 0 2px">${label}</div>${ND}`;
    const max=Math.max(1,...['foreign','institution','individual'].map(k=>Math.abs(o[k]||0)));
    const row=(who,v)=>{const w=has(v)?Math.min(50,Math.abs(v)/max*50):0;const col=v>0?'var(--up)':'var(--down)';const dir=v>0?'left:50%':'right:50%';
      return `<div class="flowrow"><span class="who">${who}</span><span class="bar"><i style="${dir};width:${w}%;background:${col}"></i></span><span class="amt">${won(v)}</span></div>`;};
    return `<div class="subtle" style="margin:8px 0 2px">${label}</div>${row('외국인',o.foreign)}${row('기관',o.institution)}${row('개인',o.individual)}`;};
  $('#flows').innerHTML=mkt('코스피',f.kospi)+mkt('코스닥',f.kosdaq);
}

function heatColor(p){if(!has(p))return 'background:var(--panel2)';const a=Math.min(1,Math.abs(p)/2.5)*0.55+0.12;const c=p>=0?'255,77,86':'77,141,255';return `background:rgba(${c},${a});border-color:rgba(${c},${a+0.15})`;}
function renderHeat(){
  const s=DATA.sectors;if(!has(s)){$('#heat').innerHTML=ND;return;}
  $('#heat').innerHTML=s.map(x=>`<div class="cell" style="${heatColor(x.change_pct)}"><span class="n">${x.name}</span><span class="p ${cls(x.change_pct)}">${has(x.change_pct)?sign(x.change_pct)+x.change_pct.toFixed(2)+'%':'—'}</span></div>`).join('');
}

function renderMovers(){
  const m=DATA.movers;const seg=$('#moverSeg');
  seg.innerHTML=[['gainers','급등'],['losers','급락'],['volume','거래량']].map(([k,l])=>`<button data-k="${k}" class="${k===moverTab?'on':''}">${l}</button>`).join('');
  seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{moverTab=b.dataset.k;renderMovers();});
  if(!has(m)||!has(m[moverTab])){$('#movers').innerHTML=ND;return;}
  const volMode=moverTab==='volume';
  let h=`<table><thead><tr><th>종목</th><th>종가</th><th>등락</th><th>${volMode?'거래량배수':'거래량'}</th></tr></thead><tbody>`;
  h+=m[moverTab].map(r=>`<tr><td>${r.name}<div class="tk">${r.ticker||''}</div></td><td>${num(r.last)}</td><td>${pct(r.change_pct)}</td><td>${volMode?(has(r.vol_ratio)?'<span class="mono" style="color:var(--accent2)">x'+r.vol_ratio.toFixed(1)+'</span>':ND):(has(r.volume)?fmt(Math.round(r.volume/1000))+'K':ND)}</td></tr>`).join('');
  $('#movers').innerHTML=h+'</tbody></table>';
}

function renderEarn(){
  const e=DATA.earnings;if(!has(e)){$('#earn').innerHTML=ND;return;}
  $('#earn').innerHTML=e.map(x=>{const sur=has(x.surprise_pct)?`<span class="${cls(x.surprise_pct)} mono">${sign(x.surprise_pct)}${x.surprise_pct.toFixed(1)}%</span>`:ND;
    return `<div class="ern"><div class="nm">${x.corp} <span class="tk">${x.period||''}</span><div class="subtle" style="margin:1px 0 0">${x.unit||''}</div></div><div class="v"><span class="k">실제</span>${has(x.actual)?fmt(x.actual,1):ND}</div><div class="v"><span class="k">컨센</span>${has(x.consensus)?fmt(x.consensus,1):ND}</div><div class="v"><span class="k">서프라이즈</span>${sur}</div></div>`;}).join('');
}
function renderNews(){
  const n=DATA.news;$('#newsTag').textContent=has(n)?n.length+'건':'';
  if(!has(n)){$('#news').innerHTML=ND;return;}
  $('#news').innerHTML=n.map(x=>`<div class="news-item"><a href="${x.url||'#'}" target="_blank" rel="noopener">${x.title}</a>${x.summary?`<div class="sum">${x.summary}</div>`:''}<div class="src"><span>${x.source||''}</span><span>${x.published_at||''}</span>${x.url&&x.url!=='#'?'<span>원문 →</span>':''}</div></div>`).join('');
}

function widgetSlot(sel,url,ph){
  const el=$(sel);if(!el)return;
  el.innerHTML=(url&&url.trim())
    ? `<div class="widget-ph">위젯 로딩 중…</div><iframe src="${url}" loading="lazy" referrerpolicy="origin"></iframe>`
    : `<div class="widget-ph">${ph}</div>`;
}
function renderWidgets(){
  if(DEMO){renderSampleNight();renderSampleCalendar();return;}
  widgetSlot('#calSlot',INVESTING_CALENDAR_URL,"경제캘린더 위젯 URL을 설정하세요 (Investing.com 웹마스터툴 → 경제캘린더).");
  widgetSlot('#nightSlot',INVESTING_NIGHT_URL,"야간선물 위젯 URL을 설정하세요 — Investing.com 웹마스터툴 → Custom Real-Time Chart 에서 'KOSPI 200 Futures' 생성 후 iframe src 를 코드 상단 INVESTING_NIGHT_URL 에 붙여넣기");
}
function renderSampleNight(){
  const pts=[366.2,366.9,367.1,366.5,367.4,368.1,367.8,368.6,368.9];
  const w=120,h=34,mn=Math.min(...pts),mx=Math.max(...pts);
  const d=pts.map((v,i)=>`${(i/(pts.length-1)*w).toFixed(1)},${(h-(v-mn)/((mx-mn)||1)*h).toFixed(1)}`).join(' ');
  const up=pts[pts.length-1]>=pts[0],col=up?'var(--up)':'var(--down)';
  $('#nightSlot').innerHTML=`<div class="night"><div class="sub">K200 야간선물 · 미국시간 연동 (샘플)</div>
    <div style="display:flex;align-items:flex-end;gap:12px"><span class="big">368.90</span>
    <span class="mono ${up?'up':'down'}" style="font-size:13px">+0.31%</span>
    <svg width="${w}" height="${h}" style="margin-left:auto"><polyline points="${d}" fill="none" stroke="${col}" stroke-width="1.5"/></svg></div></div>`;
}
function renderSampleCalendar(){
  $('#calSlot').innerHTML=`<div class="evtwrap">`+SAMPLE_SCHEDULE.map(e=>
    `<div class="evt"><span class="t">${e.time}</span><span class="e">${e.event}</span>`+
    `<span class="fl ${e.region==='US'?'us':'kr'}">${e.region}</span>`+
    (e.importance==='hi'?'<span class="fl hi">중요</span>':'')+`</div>`).join('')+`</div>`;
}

function renderStatus(){
  const map={indices:'지수',flows:'수급',movers:'특징주',news:'뉴스',earnings:'실적',charts:'차트'};
  const src=(DATA.meta&&DATA.meta.sources)||{};
  $('#status').innerHTML=Object.keys(map).map(k=>{const ok=has(DATA[k]);const s=src[k];return `<span class="${ok?'ok':'miss'}">●</span> ${map[k]}${s?`<span style="color:var(--faint)"> (${s})</span>`:''}`;}).join('&nbsp;&nbsp;');
  $('#sources').textContent=DEMO?'※ 샘플 모드 — 실데이터 아님':'출처: 자동 수집 스냅샷 + Investing.com 위젯';
}

/* ===== chart ===== */
function resample(ohlcv,iv){
  if(iv==='D')return ohlcv;
  const key=t=>{const d=new Date(t);if(iv==='M')return d.getUTCFullYear()*12+d.getUTCMonth();const onejan=Date.UTC(d.getUTCFullYear(),0,1);return d.getUTCFullYear()*100+Math.floor((t-onejan)/(7*86400000));};
  const out=[];let cur=null,ck=null;
  for(const b of ohlcv){const k=key(b[0]);if(k!==ck){if(cur)out.push(cur);cur=[b[0],b[1],b[2],b[3],b[4],b[5]];ck=k;}else{cur[2]=Math.max(cur[2],b[2]);cur[3]=Math.min(cur[3],b[3]);cur[4]=b[4];cur[5]+=b[5];}}
  if(cur)out.push(cur);return out;
}
function sma(a,p){const o=Array(a.length).fill(null);let s=0;for(let i=0;i<a.length;i++){s+=a[i];if(i>=p)s-=a[i-p];if(i>=p-1)o[i]=s/p;}return o;}

const cv=$('#chart'),ctx=cv.getContext('2d');
let GEO=null,HOVER=null;
function initChartControls(){
  const c=DATA.charts||{};const keys=Object.keys(c);const sel=$('#symSel');
  if(keys.length===0){sel.innerHTML='<option>차트 데이터 없음</option>';drawChart();return;}
  sel.innerHTML=keys.map(k=>`<option value="${k}">${c[k].name||k}</option>`).join('');
  if(!state.sym||!c[state.sym])state.sym=keys[0];sel.value=state.sym;
  sel.onchange=()=>{state.sym=sel.value;HOVER=null;drawChart();};
  $('#typeSeg').innerHTML=[['area','라인'],['candle','캔들']].map(([v,l])=>`<button data-t="${v}" class="${v===state.chartType?'on':''}">${l}</button>`).join('');
  $('#periodSeg').innerHTML=PERIODS.map(([l,m])=>`<button data-m="${m}" class="${m===state.period?'on':''}">${l}</button>`).join('');
  $('#intervalSeg').innerHTML=INTERVALS.map(([l,v])=>`<button data-v="${v}" class="${v===state.interval?'on':''}">${l}</button>`).join('');
  bindSeg('#typeSeg',b=>state.chartType=b.dataset.t);
  bindSeg('#periodSeg',b=>state.period=+b.dataset.m);
  bindSeg('#intervalSeg',b=>state.interval=b.dataset.v);
  drawChart();
}
function bindSeg(sel,fn){$$(sel+' button').forEach(b=>b.onclick=()=>{$$(sel+' button').forEach(x=>x.classList.remove('on'));b.classList.add('on');fn(b);HOVER=null;drawChart();});}

function drawChart(){
  const wrap=cv.parentElement,dpr=window.devicePixelRatio||1,W=wrap.clientWidth,H=wrap.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);
  const c=(DATA.charts||{})[state.sym];
  if(!c||!has(c.ohlcv)){GEO=null;ctx.fillStyle='#3a4654';ctx.font='13px monospace';ctx.fillText('차트 데이터 없음',W/2-50,H/2);$('#legend').innerHTML='';return;}
  let bars=resample(c.ohlcv,state.interval);
  const last=bars[bars.length-1][0];const cutoff=new Date(last);cutoff.setUTCMonth(cutoff.getUTCMonth()-state.period);
  bars=bars.filter(b=>b[0]>=cutoff.getTime());
  if(bars.length<2){GEO=null;ctx.fillStyle='#3a4654';ctx.font='12px monospace';ctx.fillText('기간 내 데이터 부족',W/2-60,H/2);return;}
  const closes=bars.map(b=>b[4]),ma20=sma(closes,20),ma60=sma(closes,60);
  const padR=60,padL=8,padT=10,padB=22,n=bars.length,cw=W-padR-padL,plotH=H-padT-padB;
  const bw=cw/n,body=Math.max(1,Math.min(bw*0.7,10));
  let pmin=Infinity,pmax=-Infinity;
  bars.forEach(b=>{pmin=Math.min(pmin,b[3]);pmax=Math.max(pmax,b[2]);});
  [ma20,ma60].forEach(a=>a.forEach(v=>{if(has(v)){pmin=Math.min(pmin,v);pmax=Math.max(pmax,v);}}));
  const pad=(pmax-pmin)*0.08||1;pmin-=pad;pmax+=pad;
  const yP=v=>padT+plotH-(v-pmin)/(pmax-pmin)*plotH, xC=i=>padL+i*bw+bw/2;
  GEO={n,padL,cw,bw};
  ctx.font='10px "IBM Plex Mono",monospace';ctx.lineWidth=1;
  ctx.strokeStyle='#141b22';ctx.fillStyle='#566472';
  for(let g=0;g<=4;g++){const v=pmin+(pmax-pmin)*g/4,y=yP(v);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(padL+cw,y);ctx.stroke();ctx.fillText(Math.round(v).toLocaleString(),padL+cw+5,y+3);}
  const dir=closes[n-1]>=closes[0],col=dir?'#ff4d56':'#4d8dff';
  if(state.chartType==='area'){
    const g=ctx.createLinearGradient(0,padT,0,padT+plotH);
    g.addColorStop(0,dir?'rgba(255,77,86,.28)':'rgba(77,141,255,.28)');g.addColorStop(1,dir?'rgba(255,77,86,0)':'rgba(77,141,255,0)');
    ctx.beginPath();ctx.moveTo(xC(0),yP(closes[0]));for(let i=1;i<n;i++)ctx.lineTo(xC(i),yP(closes[i]));
    ctx.lineTo(xC(n-1),padT+plotH);ctx.lineTo(xC(0),padT+plotH);ctx.closePath();ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.moveTo(xC(0),yP(closes[0]));for(let i=1;i<n;i++)ctx.lineTo(xC(i),yP(closes[i]));ctx.strokeStyle=col;ctx.lineWidth=1.8;ctx.stroke();
  }else{
    bars.forEach((b,i)=>{const x=xC(i),up=b[4]>=b[1],cc=up?'#ff4d56':'#4d8dff';ctx.strokeStyle=cc;ctx.fillStyle=cc;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,yP(b[2]));ctx.lineTo(x,yP(b[3]));ctx.stroke();const yo=yP(b[1]),yc=yP(b[4]);ctx.fillRect(x-body/2,Math.min(yo,yc),body,Math.max(1,Math.abs(yc-yo)));});
  }
  const line=(arr,c2,w)=>{ctx.beginPath();let st=false;for(let i=0;i<n;i++){if(!has(arr[i])){st=false;continue;}const x=xC(i),y=yP(arr[i]);if(!st){ctx.moveTo(x,y);st=true}else ctx.lineTo(x,y);}ctx.strokeStyle=c2;ctx.lineWidth=w;ctx.stroke();};
  line(ma20,'#d8a24a',1.2);line(ma60,'#9b6dd8',1.2);
  ctx.fillStyle='#566472';const step=Math.ceil(n/7);
  for(let i=0;i<n;i+=step){const d=new Date(bars[i][0]);const lbl=state.period<=6?`${d.getUTCMonth()+1}/${d.getUTCDate()}`:`${String(d.getUTCFullYear()).slice(2)}.${String(d.getUTCMonth()+1).padStart(2,'0')}`;ctx.fillText(lbl,xC(i)-12,H-6);}
  const hi=HOVER!=null&&HOVER<n?HOVER:n-1;
  drawLegend(hi,bars,ma20,ma60);
  if(HOVER!=null&&HOVER>=0&&HOVER<n){const x=xC(HOVER),y=yP(bars[HOVER][4]);
    ctx.strokeStyle='rgba(200,210,220,.25)';ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(x,padT);ctx.lineTo(x,padT+plotH);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#e6edf3';ctx.beginPath();ctx.arc(x,y,3,0,7);ctx.fill();}
}
function drawLegend(i,bars,ma20,ma60){
  const b=bars[i],prev=i>0?bars[i-1][4]:b[1],chg=(b[4]-prev)/prev*100;
  const fc=v=>has(v)?Math.round(v).toLocaleString():'—';const d=new Date(b[0]);
  const ds=`${d.getUTCFullYear()}.${String(d.getUTCMonth()+1).padStart(2,'0')}.${String(d.getUTCDate()).padStart(2,'0')}`;
  $('#legend').innerHTML=`<span style="color:var(--text2)">${ds}</span><span>종가 <b style="color:${chg>=0?'var(--up)':'var(--down)'}">${fc(b[4])}</b></span><span class="${chg>=0?'up':'down'}">${chg>=0?'+':''}${chg.toFixed(2)}%</span><span style="color:#d8a24a">MA20 ${fc(ma20[i])}</span><span style="color:#9b6dd8">MA60 ${fc(ma60[i])}</span>`;
}
cv.addEventListener('mousemove',e=>{if(!GEO)return;const r=cv.getBoundingClientRect();const mx=e.clientX-r.left;let i=Math.round((mx-GEO.padL-GEO.bw/2)/GEO.bw);i=Math.max(0,Math.min(GEO.n-1,i));if(i!==HOVER){HOVER=i;drawChart();}});
cv.addEventListener('mouseleave',()=>{if(HOVER!=null){HOVER=null;drawChart();}});
let rto;window.addEventListener('resize',()=>{clearTimeout(rto);rto=setTimeout(drawChart,120);});
</script>
