name: Daily Premarket Snapshot

# 매일 07:40·08:10 KST(=UTC 22:40·23:10 전날) 두 번 시도.
# GitHub 예약 실행은 가끔 누락되므로 백업 시각을 둠. (둘 다 돌아도 결과 동일 — 덮어쓰기)
on:
  schedule:
    - cron: '40 22 * * *'
    - cron: '10 23 * * *'
  workflow_dispatch:

# 액션을 Node 24에서 실행 (Node 20 지원 종료 대비). 이 한 줄로 deprecation 경고 해소.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Collect snapshot.json
        run: python collect.py --out snapshot.json
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp snapshot.json _site/
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
