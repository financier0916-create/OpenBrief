name: Daily Premarket Snapshot

# 매일 08:20 KST(=UTC 23:20). KRX 전일 데이터가 08:00에 갱신되므로 그 이후 실행.
on:
  schedule:
    - cron: '20 23 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Collect snapshot.json
        run: python collect.py --out snapshot.json
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp snapshot.json _site/
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
